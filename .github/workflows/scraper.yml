name: Scraper de Carreras Diario

on:
  schedule:
    - cron: '0 8 * * *' # Se ejecuta todos los días a las 08:00 AM UTC (09:00/10:00 hora de España)
  workflow_dispatch: # Te permite ejecutarlo manualmente desde GitHub cuando quieras

jobs:
  scrape_races:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar navegadores para Playwright
        run: playwright install chromium

      - name: Ejecutar Scraper
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python run_scraper.py